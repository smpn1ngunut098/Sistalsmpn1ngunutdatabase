// ============ DATA STORAGE SUPABASE ============
function createSupabaseDataSdk() {
    let handlerRef = null;

    function mapRow(row) {
        const payload = row.data || {};
        return {
            ...payload,
            type: row.type || payload.type,
            __backendId: row.id
        };
    }

    function cleanRecord(record) {
        const copy = { ...record };
        delete copy.__backendId;
        return copy;
    }

    async function load() {
        try {
            const client = getSupabaseClient();
            const { data, error } = await client
                .from('records')
                .select('id,type,data,created_at,updated_at')
                .order('created_at', { ascending: true });

            if (error) {
                lastDataError = error.message || 'Gagal membaca tabel records.';
                console.error('Supabase load error:', error);
                return { isOk: false, error };
            }

            const mapped = (data || []).map(mapRow);
            if (handlerRef && typeof handlerRef.onDataChanged === 'function') {
                handlerRef.onDataChanged(mapped);
            }
            return { isOk: true, value: mapped };
        } catch (error) {
            lastDataError = error.message || String(error);
            console.error('Supabase load exception:', error);
            return { isOk: false, error };
        }
    }

    return {
        async init(handler) {
            handlerRef = handler;
            return await load();
        },

        async create(record) {
            try {
                const client = getSupabaseClient();
                const clean = cleanRecord(record);
                const { data, error } = await client
                    .from('records')
                    .insert({ type: record.type, data: clean })
                    .select('id,type,data,created_at,updated_at')
                    .single();

                if (error) {
                    lastDataError = error.message || 'Gagal menyimpan data.';
                    console.error('Supabase create error:', error);
                    return { isOk: false, error };
                }

                await load();
                return { isOk: true, value: mapRow(data) };
            } catch (error) {
                lastDataError = error.message || String(error);
                console.error('Supabase create exception:', error);
                return { isOk: false, error };
            }
        },

        async update(record) {
            try {
                const client = getSupabaseClient();
                if (!record.__backendId) {
                    const error = { message: 'ID data Supabase tidak ditemukan.' };
                    lastDataError = error.message;
                    return { isOk: false, error };
                }
                const clean = cleanRecord(record);
                const { data, error } = await client
                    .from('records')
                    .update({ type: record.type, data: clean })
                    .eq('id', record.__backendId)
                    .select('id,type,data,created_at,updated_at')
                    .single();

                if (error) {
                    lastDataError = error.message || 'Gagal mengubah data.';
                    console.error('Supabase update error:', error);
                    return { isOk: false, error };
                }

                await load();
                return { isOk: true, value: mapRow(data) };
            } catch (error) {
                lastDataError = error.message || String(error);
                console.error('Supabase update exception:', error);
                return { isOk: false, error };
            }
        },

        async delete(record) {
            try {
                const client = getSupabaseClient();
                if (!record.__backendId) {
                    const error = { message: 'ID data Supabase tidak ditemukan.' };
                    lastDataError = error.message;
                    return { isOk: false, error };
                }
                const { error } = await client
                    .from('records')
                    .delete()
                    .eq('id', record.__backendId);

                if (error) {
                    lastDataError = error.message || 'Gagal menghapus data.';
                    console.error('Supabase delete error:', error);
                    return { isOk: false, error };
                }

                await load();
                return { isOk: true };
            } catch (error) {
                lastDataError = error.message || String(error);
                console.error('Supabase delete exception:', error);
                return { isOk: false, error };
            }
        }
    };
}

// ============ HELPERS ============
function toast(msg, type = 'success') {

    const colors = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500' };
    const el = document.createElement('div');

    el.textContent = msg;
    c.appendChild(el);

function getByType(type) { return allData.filter(d => d.type === type); }
function escapeHTML(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[char]));
}


function normalizeClassLevel(value) {
    const text = String(value || '').toUpperCase().trim();
    if (text === '7' || text === 'VII') return 'VII';
    if (text === '8' || text === 'VIII') return 'VIII';
    if (text === '9' || text === 'IX') return 'IX';
    return text;
}

function getClassLevelRank(cls) {
    const rawLevel = normalizeClassLevel(cls?.class_level);
    const rawName = String(cls?.class_name || '').toUpperCase().trim();
    const detected = normalizeClassLevel(
        rawLevel ||
        (rawName.match(/^(VII|VIII|IX|7|8|9)(?=\s|[-_.\/]|[A-Z]|$)/)?.[1] || '')
    );
    const rank = { VII: 7, VIII: 8, IX: 9 };
    return rank[detected] || 999;
}

function getClassAlphabetKey(cls) {
    let name = String(cls?.class_name || '').trim();
    name = name
        .replace(/^kelas\s+/i, '')
        .replace(/^(VII|VIII|IX|7|8|9)\s*[-_.\/]*\s*/i, '')
        .trim();
    return name || String(cls?.class_name || '').trim();
}

function sortClasses(classes) {
    return [...classes].sort((a, b) => {
        const levelA = getClassLevelRank(a);
        const levelB = getClassLevelRank(b);
        if (levelA !== levelB) return levelA - levelB;

        const nameA = getClassAlphabetKey(a);
        const nameB = getClassAlphabetKey(b);
        const nameCompare = nameA.localeCompare(nameB, 'id', { numeric: true, sensitivity: 'base' });
        if (nameCompare !== 0) return nameCompare;

        return String(a.class_name || '').localeCompare(String(b.class_name || ''), 'id', { numeric: true, sensitivity: 'base' });
    });
}

function getClasses() { return sortClasses(getByType('class')); }
function getStudents() { return getByType('student'); }

function classDropdown(selected = '', id = 'filter-class') {
    const cls = getClasses();
    return `<select id="${id}" class="px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm" onchange="renderCurrentPage()">

        ${cls.map(c => `<option value="${c.class_name}" ${c.class_name === selected ? 'selected' : ''}>${c.class_name}</option>`).join('')}
    </select>`;
}


function getLocalTodayISO() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
}

function getCurrentMonthValue() {
    return getLocalTodayISO().slice(0, 7);
}

function normalizeMonthValue(value, allowEmpty = true) {
    const raw = String(value || '').trim();
    if (!raw) return allowEmpty ? '' : getCurrentMonthValue();
    const match = raw.match(/^(\d{4})-(\d{2})$/);
    if (!match) return getCurrentMonthValue();
    const year = Number(match[1]);
    const month = Number(match[2]);
    if (year < 2000 || year > 2100 || month < 1 || month > 12) return getCurrentMonthValue();
    return raw;
}

function getAbsensiFilterMonthValue() {
    const monthSelect = document.getElementById('filter-month-select');
    const yearSelect = document.getElementById('filter-year-select');
    if (monthSelect && yearSelect) {
        const month = monthSelect.value;
        const year = yearSelect.value;
        if (!month) return '';
        return normalizeMonthValue(`${year}-${month}`, false);
    }
    const hidden = document.getElementById('filter-month')?.value || getCurrentMonthValue();
    return normalizeMonthValue(hidden, false);
}

function updateAbsensiMonthFilter() {
    const hidden = document.getElementById('filter-month');
    if (hidden) hidden.value = getAbsensiFilterMonthValue();
    renderCurrentPage();
}

function setAbsensiMonthToCurrent() {
    const current = getCurrentMonthValue();
    const [year, month] = current.split('-');
    const monthSelect = document.getElementById('filter-month-select');
    const yearSelect = document.getElementById('filter-year-select');
    const hidden = document.getElementById('filter-month');
    if (monthSelect) monthSelect.value = month;
    if (yearSelect) yearSelect.value = year;
    if (hidden) hidden.value = current;
    renderCurrentPage();
}

function setAbsenDateToday() {
    const input = document.getElementById('inp-abs-date');
    if (input) input.value = getLocalTodayISO();
}

function formatDateID(dateValue) {
    const raw = String(dateValue || '').trim();
    const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!match) return raw || '-';
    const [_, yyyy, mm, dd] = match;
    const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    return `${dd} ${bulan[Number(mm) - 1]} ${yyyy}`;
}


function isDuplicateStudent(nis, nisn, excludeId = null) {
    return getStudents().some(s => {
        if (excludeId && s.__backendId === excludeId) return false;
        const sameNis = nis && String(s.nis || '').trim() === String(nis).trim();
        const sameNisn = nisn && String(s.nisn || '').trim() === String(nisn).trim();
        return sameNis || sameNisn;
    });
}

// ============ AUTH ============
function showRegister() { document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); hideError(); }
function showLogin() { document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); hideError(); }
function showError(msg) { const el = document.getElementById('login-error'); el.textContent = msg; el.classList.remove('hidden'); }
function hideError() { document.getElementById('login-error').classList.add('hidden'); }

async function doRegister() {
    hideError();
    if (!await ensureDataReady()) return showError('❌ Sistem gagal dimuat: ' + getDataReadyMessage());
    
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim().toLowerCase();
    const pass = document.getElementById('reg-pass').value;
    const role = document.getElementById('reg-role').value;
    
    if (!name || !email || !pass) return showError('Semua field harus diisi');
    
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) return showError('Format email tidak valid (contoh: nama@gmail.com)');
    if (pass.length < 6) return showError('Password minimal 6 karakter');
    
    const exists = getUsers().find(u => (u.email || '').toLowerCase().trim() === email);
    if (exists) return showError('Email sudah terdaftar');
    
    const btn = window.event?.target || document.querySelector('#register-form button');
    btn.disabled = true;
    btn.textContent = 'Memproses...';
    
    window.dataSdk.create({ 
        type: 'user', 
        name, 
        email, 
        password: pass, 
        role, 
        approval_status: (role === 'wali_kelas' || role === 'staff') ? 'pending' : 'approved',
        photo: '', 
        theme: 'light', 
        is_blocked: false, 
        created_at: new Date().toISOString() 
    }).then(r => {
        if (r.isOk) { 
            if (role === 'wali_kelas' || role === 'staff') {
                toast('⏳ Pendaftaran berhasil. Menunggu persetujuan Super Admin.');
            } else {
                toast('✅ Akun berhasil dibuat! Silakan login.');
            } 
            showLogin(); 
            document.getElementById('login-email').value = email;
            document.getElementById('login-pass').value = '';
        }
        else { 
            showError('❌ Gagal mendaftar: ' + (r.error?.message || 'Silakan coba lagi'));
        }
        btn.disabled = false;
        btn.textContent = 'Daftar';
    });
}

async function doLogin() {
    hideError();
    if (!await ensureDataReady()) return showError('❌ Sistem gagal dimuat: ' + getDataReadyMessage());
    
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    
    if (!email || !pass) return showError('Email dan password harus diisi');
    
    const user = getUsers().find(u => {
        const uEmail = (u.email || '').toLowerCase().trim();
        const inputEmail = email.toLowerCase().trim();
        return uEmail === inputEmail && u.password === pass;
    });
    
    if (!user) return showError('Email atau password salah');
    
    const isBlocked = user.is_blocked === true || user.is_blocked === 'true';
    if (isBlocked) return showError('⛔ Akun Anda telah diblokir');

    if (user.approval_status === 'pending') return showError('⏳ Akun Anda masih dalam antrean persetujuan Super Admin');
    
    currentUser = user;
    appTheme = user.theme || 'light';
    applyTheme();
    document.getElementById('page-login').classList.add('hidden');
    document.getElementById('page-app').classList.remove('hidden');
    renderSidebar();
    navigate('dashboard');
    toast('✅ Selamat datang, ' + currentUser.name);
}

function logout() {
    currentUser = null;
    document.getElementById('page-app').classList.add('hidden');
    document.getElementById('page-login').classList.remove('hidden');
    document.getElementById('login-email').value = '';
    document.getElementById('login-pass').value = '';
}

function applyTheme() {
    if (appTheme === 'dark') document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
}

function getMenuItems() {
    const role = currentUser?.role;
    let items = [
        { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' }
    ];
    if (role === 'admin' || role === 'wali_kelas') {
        items.push(
            { id: 'kelas', icon: 'school', label: 'Kelas' },
            { id: 'siswa', icon: 'users', label: 'Siswa' },
            { id: 'jadwal', icon: 'calendar', label: 'Jadwal' },
            { id: 'absen', icon: 'clipboard-check', label: 'Absensi' },
            { id: 'jurnal', icon: 'book-open', label: 'Jurnal Mengajar' }
        );
    }
    if (role === 'staff') {
        items.push(
            { id: 'absen', icon: 'clipboard-check', label: 'Absensi' }
        );
    }
    if (role === 'admin') {
        items.push({ id: 'pengguna', icon: 'users', label: 'Pengguna' });
    }
    items.push({ id: 'pengaturan', icon: 'settings', label: 'Pengaturan' });

function updateSidebarProfile() {
    const nameEl = document.getElementById('user-name-display');
    const roleEl = document.getElementById('user-role-display');
    const avatarEl = document.getElementById('user-avatar');
    if (!currentUser || !nameEl || !roleEl || !avatarEl) return;

    nameEl.textContent = currentUser.name;
    roleEl.textContent = currentUser.role === 'admin' ? 'Super Admin' : currentUser.role.replace('_', ' ');

    if (currentUser.photo) {
        avatarEl.className = 'w-9 h-9 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden shrink-0';
        avatarEl.innerHTML = `<img src="${currentUser.photo}" alt="Foto Profil" class="w-full h-full object-cover rounded-full">`;
    } else {
        avatarEl.className = 'w-9 h-9 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-blue-600 dark:text-blue-400 font-bold text-sm shrink-0';
        avatarEl.textContent = (currentUser.name || 'G').charAt(0).toUpperCase();
    }

function renderSidebar() {
    const nav = document.getElementById('sidebar-nav');
    const items = getMenuItems();
    nav.innerHTML = items.map(i => `
        <button onclick="navigate('${i.id}')" class="sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition ${currentPage === i.id ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700'}">
            <i data-lucide="${i.icon}" class="w-4 h-4"></i> ${i.label}

    updateSidebarProfile();

function navigate(page) {
    currentPage = page;
    renderSidebar();
    renderCurrentPage();
}

function renderCurrentPage() {
    const mc = document.getElementById('main-content');
    switch(currentPage) {
        case 'dashboard': mc.innerHTML = renderDashboard(); break;
        case 'kelas': mc.innerHTML = renderKelas(); break;
        case 'siswa': mc.innerHTML = renderSiswa(); break;
        case 'jadwal': mc.innerHTML = renderJadwal(); break;
        case 'absen': mc.innerHTML = renderAbsen(); break;
        case 'jurnal': mc.innerHTML = renderJurnal(); break;
        case 'pengguna': mc.innerHTML = renderPengguna(); break;
        case 'pengaturan': mc.innerHTML = renderPengaturan(); break;
        default: mc.innerHTML = renderDashboard();
    }
    lucide.createIcons();
}

function renderDashboard() {
    const classes = getClasses();
    const students = getStudents();
    const attendance = getAttendance();
    const journals = getJournals();

    let chartHTML = '';
    if (classes.length > 0) {
        chartHTML = `<div class="mt-6 bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
            <h3 class="font-semibold mb-4 text-base">Grafik Kehadiran per Kelas</h3>
            <div class="space-y-3">
                ${classes.map(c => {
                    const classStudents = students.filter(s => s.class_id === c.class_name);
                    const classAtt = attendance.filter(a => a.class_id === c.class_name);
                    const hadir = classAtt.filter(a => a.status === 'HADIR').length;
                    const total = classAtt.length || 1;
                    const pct = Math.round((hadir / total) * 100);
                    return `<div>
                        <div class="flex justify-between text-sm mb-1"><span>${c.class_name}</span><span class="font-medium">${pct}%</span></div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">

// ============ FUNGSI HAPUS (POPUP) ============
async function deleteRecord(id) {
    const rec = allData.find(d => d.__backendId === id);
    if (!rec) return;
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/40 flex items-center justify-center z-50';
    overlay.innerHTML = `<div class="bg-white dark:bg-slate-800 rounded-xl p-6 max-w-sm mx-4 shadow-xl">
        <p class="font-semibold mb-2">Konfirmasi Hapus</p>
        <p class="text-sm text-slate-500 mb-4">Yakin ingin menghapus data ini?</p>
        <div class="flex gap-2 justify-end">
            <button id="cancel-del" class="px-4 py-2 bg-slate-200 dark:bg-slate-600 rounded-lg text-sm">Batal</button>
            <button id="confirm-del" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">Hapus</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#cancel-del').onclick = () => overlay.remove();
    overlay.querySelector('#confirm-del').onclick = async () => {
        overlay.remove();
        const recordsToDelete = [rec];
        if (rec.type === 'class') {
            const className = rec.class_name;
            recordsToDelete.push(...allData.filter(item =>
                (item.type === 'student' && item.class_id === className) ||
                (item.type === 'schedule' && item.class_id === className) ||
                (item.type === 'attendance' && item.class_id === className) ||
                (item.type === 'journal' && item.class_id === className)
            ));
        }
        let ok = true;
        for (const item of recordsToDelete) {
            const r = await window.dataSdk.delete(item);
            if (!r.isOk) ok = false;
        }
        if (ok) {
            toast(recordsToDelete.length > 1 ? `Data dihapus beserta ${recordsToDelete.length - 1} data terkait` : 'Data dihapus');
            renderCurrentPage();
        } else toast('Sebagian data gagal dihapus', 'error');
    };
}

// ============ SISWA ============
function renderSiswa() {
    const filterClass = document.getElementById('filter-class')?.value || '';
    let students = getStudents();
    if (filterClass) students = students.filter(s => s.class_id === filterClass);

    const totalStudents = getStudents().length;
    const classes = getClasses();
    const classOrder = new Map(classes.map((c, i) => [c.class_name, i]));

    const groupedStudents = {};
    students.forEach(s => {
        const className = s.class_id || 'Tanpa Kelas';
        if (!groupedStudents[className]) groupedStudents[className] = [];
        groupedStudents[className].push(s);
    });

    const classNames = Object.keys(groupedStudents).sort((a, b) => {
        const orderA = classOrder.has(a) ? classOrder.get(a) : 9999;
        const orderB = classOrder.has(b) ? classOrder.get(b) : 9999;
        if (orderA !== orderB) return orderA - orderB;
        return a.localeCompare(b, 'id', { numeric: true, sensitivity: 'base' });
    });

    const tableHeader = `
        <thead class="bg-slate-50 dark:bg-slate-700">
            <tr>
                <th class="px-4 py-3 text-left w-14">No</th>
                <th class="px-4 py-3 text-left">INDUK</th>
                <th class="px-4 py-3 text-left">NISN</th>
                <th class="px-4 py-3 text-left">Nama Siswa</th>
                <th class="px-4 py-3 text-left">JK</th>
                <th class="px-4 py-3 text-center w-28">Aksi</th>
            </tr>
        </thead>`;

    const renderRows = (studentList) => studentList.map((s, idx) => `
        <tr class="border-t border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/40">
            <td class="px-4 py-3 text-xs font-medium">${idx + 1}</td>
            <td class="px-4 py-3 text-xs">${s.nis || '-'}</td>
            <td class="px-4 py-3 text-xs">${s.nisn || '-'}</td>
            <td class="px-4 py-3 font-medium">${s.student_name || '-'}</td>
            <td class="px-4 py-3">${s.gender || '-'}</td>
            <td class="px-4 py-3 text-center">
                <div class="inline-flex gap-1">
                    <button onclick="editStudent('${s.__backendId}')" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs font-medium inline-flex items-center gap-1">
                        <i data-lucide="pencil" class="w-3 h-3"></i> Edit
                    </button>
                    <button onclick="deleteStudent('${s.__backendId}')" class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-medium inline-flex items-center gap-1">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> Hapus
                    </button>
                </div>
            </td>
        </tr>`).join('');

    const groupedTablesHTML = students.length === 0
        ? `<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 text-center text-slate-400">Belum ada data siswa</div>`
        : classNames.map(className => {
            const list = groupedStudents[className];
            return `
                <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden mb-5">
                    <div class="flex items-center justify-between px-4 py-3 bg-slate-100 dark:bg-slate-700 border-b border-slate-200 dark:border-slate-600">
                        <div>
                            <h3 class="font-bold text-base text-slate-800 dark:text-slate-100">Kelas ${className}</h3>
                            <p class="text-xs text-slate-500 dark:text-slate-400">Data siswa ditampilkan terpisah berdasarkan kelas</p>
                        </div>
                        <span class="px-3 py-1 rounded-full bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 text-xs font-semibold">${list.length} siswa</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            ${tableHeader}
                            <tbody>${renderRows(list)}</tbody>
                        </table>
                    </div>
                </div>`;
        }).join('');

    return `<div class="fade-in">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
            <div>
                <h2 class="text-2xl font-bold">Data Siswa</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Data siswa sudah dipisahkan per kelas agar lebih mudah dibaca.</p>
            </div>
            <div class="flex gap-2 items-center flex-wrap">
                ${classDropdown(filterClass)}
                ${totalStudents > 0 ? `<button onclick="showDeleteAllStudentsDialog()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium flex items-center gap-2"><i data-lucide="trash-2" class="w-4 h-4"></i> Hapus Semua</button>` : ''}
                <button onclick="showAddStudent()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> Tambah</button>
            </div>
        </div>
        <div id="student-form-area"></div>
        ${groupedTablesHTML}
    </div>`;
}

function handleSiswaDragOver(event) {
    event.preventDefault();

}

function handleSiswaDragLeave(event) {

    if (zone) zone.classList.remove('bg-blue-50', 'dark:bg-blue-900/20');

function handleSiswaDrop(event) {
    event.preventDefault();
    handleSiswaDragLeave(event);
    const files = event.dataTransfer?.files;
    if (!files || !files.length) return;
    const file = files[0];
    if (!/\.(xlsx|xls|csv)$/i.test(file.name)) {
        return toast('File harus Excel (.xlsx/.xls) atau CSV', 'error');
    }
    const input = document.getElementById('siswa-import-file');
    if (input) {
        input.files = files;
        const status = document.getElementById('siswa-import-status');
        if (status) status.textContent = file.name;
        importSiswaFromFile();
    }
}

async function importSiswaFromFile() {
    const input = document.getElementById('siswa-import-file');
    const file = input?.files?.[0];
    const status = document.getElementById('siswa-import-status');
    if (status && file) status.textContent = file.name;
    if (!file) return toast('Pilih file Excel terlebih dahulu', 'error');
    try {
        const arrayBuffer = await file.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        let imported = 0, classCreated = 0;

        for (const sheetName of workbook.SheetNames) {
            const classInfo = normalizeClassName(sheetName);
            if (!classInfo) continue;

            let existsClass = getClasses().find(c => c.class_name.toLowerCase() === classInfo.class_name.toLowerCase());
            if (!existsClass) {
                await window.dataSdk.create({ type: 'class', class_name: classInfo.class_name, class_level: classInfo.class_level, created_at: new Date().toISOString() });
                classCreated++;
            }

            const rawRows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1 });
            const headerIndex = findHeaderRow(rawRows);
            if (headerIndex === -1) continue;

            const headers = (rawRows[headerIndex] || []).map(cell => String(cell || '').toUpperCase().trim());
            const idxNis = findHeaderIndex(headers, ['INDUK', 'NIS']);
            const idxNisn = findHeaderIndex(headers, ['NISN']);
            const idxName = findHeaderIndex(headers, ['NAMA']);
            const idxGender = findHeaderIndex(headers, ['L/P', 'JK', 'KELAMIN']);

            for (let i = headerIndex + 1; i < rawRows.length; i++) {
                const row = rawRows[i] || [];
                const nis = String(row[idxNis] || '').trim();
                const nisn = idxNisn >= 0 ? String(row[idxNisn] || '').trim() : '';
                const studentName = String(row[idxName] || '').trim();
                const genderRaw = idxGender >= 0 ? String(row[idxGender] || 'L') : 'L';
                if (!studentName) continue;
                if (isDuplicateStudent(nis, nisn)) continue;
                await window.dataSdk.create({
                    type: 'student',
                    nis,
                    nisn,
                    student_name: studentName,
                    gender: genderRaw.toUpperCase().startsWith('P') ? 'P' : 'L',
                    class_id: classInfo.class_name,
                    created_at: new Date().toISOString()
                });
                imported++;
            }
        }
        toast(`✅ Selesai: ${imported} siswa masuk, ${classCreated} kelas baru dibuat.`);
        renderCurrentPage();
    } catch (err) {
        toast('❌ Gagal membaca dokumen file Excel', 'error');
    }
}

function normalizeClassName(rawClass) {
    let value = String(rawClass || '').trim().toUpperCase().replace(/^KELAS\s+/i, '').replace(/\s+/g, '');
    const match = value.match(/^([789])[-\s]*([A-K])$/i);
    if (!match) return null;
    const roman = { '7': 'VII', '8': 'VIII', '9': 'IX' }[match[1]];
    return { class_name: `${roman} ${match[2]}`, class_level: roman };
}

function findHeaderRow(sheetRows) {
    for (let i = 0; i < sheetRows.length; i++) {
        const text = (sheetRows[i] || []).map(cell => String(cell || '').toUpperCase()).join('|');
        if (text.includes('NAMA') && (text.includes('NIS') || text.includes('INDUK'))) return i;
    }
    return -1;
}

async function deleteStudent(id) {
    const rec = allData.find(d => String(d.__backendId) === String(id));
    if (!rec) return toast('Data siswa tidak ditemukan', 'error');

    showConfirmDialog({
        title: 'Hapus Data Siswa',
        message: `Yakin ingin menghapus siswa "${rec.student_name || '-'}"? Riwayat absensi siswa ini juga akan dibersihkan.`,
        confirmText: 'Hapus',
        danger: true,
        onConfirm: async () => {
            const related = allData.filter(item =>
                item.type === 'attendance' &&
                (
                    item.student_name === rec.student_name ||
                    (rec.class_id && item.class_id === rec.class_id && item.nis && item.nis === rec.nis) ||
                    (rec.nisn && item.nisn && item.nisn === rec.nisn)
                )
            );
            const records = [...related, rec];
            let ok = true;
            for (const item of records) {
                const result = await window.dataSdk.delete(item);
                if (!result.isOk) ok = false;
            }
            if (ok) {
                toast(`Data siswa dihapus${related.length ? ' beserta riwayat absensi' : ''}`);
                renderCurrentPage();
            } else {
                toast('Sebagian data gagal dihapus', 'error');
            }
        }
    });
}

function findHeaderIndex(headers, candidates) {
    const wanted = candidates.map(x => String(x).toUpperCase());
    const index = headers.findIndex(header => wanted.some(key => header.includes(key)));
    return index >= 0 ? index : 0;
}

function buildAbsensiDailyGraph(attendanceList) {
    const days = [
        { index: 1, label: 'Senin' },
        { index: 2, label: 'Selasa' },
        { index: 3, label: 'Rabu' },
        { index: 4, label: 'Kamis' },
        { index: 5, label: 'Jumat' },
        { index: 6, label: 'Sabtu' }
    ];

    const rows = days.map(day => {
        const items = attendanceList.filter(a => {
            if (!a.date) return false;
            const dateObj = new Date(`${a.date}T00:00:00`);
            return dateObj.getDay() === day.index;
        });
        const hadir = items.filter(a => a.status === 'HADIR').length;
        const total = items.length;
        const percent = total > 0 ? Math.round((hadir / total) * 100) : 0;
        return `
            <div class="mb-4 last:mb-0">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-semibold text-slate-700 dark:text-slate-200">${day.label}</span>
                    <span class="text-xs text-slate-500 dark:text-slate-400">${hadir}/${total} hadir</span>
                </div>
                <div class="w-full h-2 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
                    <div class="h-2 rounded-full bg-emerald-500 transition-all" style="width:${percent}%"></div>
                </div>
            </div>`;
    }).join('');

    return `
        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-5 mb-4">
            <h3 class="font-bold text-base mb-4">Rekapitulasi Absensi per Hari</h3>
            ${rows}
        </div>`;
}

async function saveAbsenBulk() {

    return getStudents().find(s =>

            (attendanceRecord.nisn && s.nisn && String(s.nisn) === String(attendanceRecord.nisn)) ||
            String(s.student_name || '') === String(attendanceRecord.student_name || '')

    );
}

function getMonthLabelID(monthValue) {
    const raw = String(monthValue || '').trim();
    if (!raw) return 'Semua Bulan';
    const match = raw.match(/^(\d{4})-(\d{2})$/);
    if (!match) return raw;
    const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const monthIndex = Number(match[2]) - 1;
    return `${bulan[monthIndex] || match[2]} ${match[1]}`;
}

function sanitizeFilename(value) {
    return String(value || 'Semua')
        .replace(/[\\/:*?"<>|]+/g, '-')
        .replace(/\s+/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_+|_+$/g, '') || 'Semua';
}

function getAttendanceStatusSummary(list) {
    const summary = { HADIR: 0, IZIN: 0, SAKIT: 0, ALPA: 0, TOTAL: 0 };
    list.forEach(item => {
        const status = String(item.status || '').toUpperCase().trim();
        if (Object.prototype.hasOwnProperty.call(summary, status)) summary[status] += 1;
        summary.TOTAL += 1;
    });
    return summary;
}

function compareClassNameForExport(a, b) {
    const classes = getClasses();
    const orderMap = new Map(classes.map((c, index) => [c.class_name, index]));
    const orderA = orderMap.has(a) ? orderMap.get(a) : 9999;
    const orderB = orderMap.has(b) ? orderMap.get(b) : 9999;
    if (orderA !== orderB) return orderA - orderB;
    return String(a || '').localeCompare(String(b || ''), 'id', { numeric: true, sensitivity: 'base' });
}

function getAbsensiExportRecords(cls, month) {
    let list = getAttendance();
    if (cls) list = list.filter(a => a.class_id === cls);
    if (month) list = list.filter(a => a.date && a.date.startsWith(month));

    const classes = getClasses();
    const orderMap = new Map(classes.map((c, index) => [c.class_name, index]));
    return [...list].sort((a, b) => {
        const classOrderA = orderMap.has(a.class_id) ? orderMap.get(a.class_id) : 9999;
        const classOrderB = orderMap.has(b.class_id) ? orderMap.get(b.class_id) : 9999;
        if (classOrderA !== classOrderB) return classOrderA - classOrderB;

        const classCompare = String(a.class_id || '').localeCompare(String(b.class_id || ''), 'id', { numeric: true, sensitivity: 'base' });
        if (classCompare !== 0) return classCompare;

        const dateCompare = String(a.date || '').localeCompare(String(b.date || ''));
        if (dateCompare !== 0) return dateCompare;

        return String(a.student_name || '').localeCompare(String(b.student_name || ''), 'id', { numeric: true, sensitivity: 'base' });
    });
}

function getAttendanceGroupedByClass(list) {
    const grouped = {};
    list.forEach(item => {
        const className = item.class_id || 'Tanpa Kelas';
        if (!grouped[className]) grouped[className] = [];
        grouped[className].push(item);
    });
    return Object.entries(grouped).sort((a, b) => compareClassNameForExport(a[0], b[0]));
}

function applyWorksheetStyle(ws, headerRows = []) {
    if (!ws || !ws['!ref']) return;
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = range.s.r; R <= range.e.r; R++) {
        for (let C = range.s.c; C <= range.e.c; C++) {
            const cellRef = XLSX.utils.encode_cell({ r: R, c: C });
            const cell = ws[cellRef];
            if (!cell) continue;
            cell.s = cell.s || {};
            cell.s.alignment = { vertical: 'center', wrapText: true };
            if (headerRows.includes(R)) {
                cell.s.font = { bold: true };
                cell.s.fill = { fgColor: { rgb: 'E2E8F0' } };
            }
        }
    }
}

    ];
    const classHeaderRows = [];

    grouped.forEach(([className, rows]) => {
        const classHeaderRow = detailRows.length;
        classHeaderRows.push(classHeaderRow);

    const list = getAbsensiExportRecords(cls, month);

    const printTime = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace(/\./g, ':');
    const summary = getAttendanceStatusSummary(list);

    function makeStudentKey(classId, nis, nisn, name) {
        return [classId || '', nis || '', nisn || '', String(name || '').trim().toLowerCase()].join('|');
    }

    const studentMap = new Map();
    getStudents()
        .filter(s => !cls || s.class_id === cls)
        .forEach(s => {
            const key = makeStudentKey(s.class_id, s.nis, s.nisn, s.student_name);
            if (!studentMap.has(key)) {
                studentMap.set(key, {
                    class_id: s.class_id || '',
                    student_name: s.student_name || '-',
                    HADIR: 0,
                    IZIN: 0,
                    SAKIT: 0,
                    ALPA: 0,
                    TOTAL: 0
                });
            }
        });

    list.forEach(item => {
        const key = makeStudentKey(item.class_id, item.nis, item.nisn, item.student_name);
        if (!studentMap.has(key)) {
            studentMap.set(key, {
                class_id: item.class_id || '',
                student_name: item.student_name || '-',
                HADIR: 0,
                IZIN: 0,
                SAKIT: 0,
                ALPA: 0,
                TOTAL: 0

        if (status === 'ALPA') row.ALPA += 1;

let journalBase64Photo = '';
function compressImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => { journalBase64Photo = event.target.result; };
    reader.readAsDataURL(file);
}

async function saveJurnal() {
    const date = document.getElementById('inp-j-date').value;
    const cls = document.getElementById('inp-j-class').value;
    const subject = document.getElementById('inp-j-subject').value.trim();
    const topic = document.getElementById('inp-j-topic').value.trim();
    const desc = document.getElementById('inp-j-desc').value.trim();
    if (!topic || !cls) return toast('Topik & Kelas wajib diisi', 'error');

    const r = await window.dataSdk.create({ type: 'journal', date, class_id: cls, subject, journal_topic: topic, journal_desc: desc, documentation: journalBase64Photo, created_at: new Date().toISOString() });
    if (r.isOk) { toast('Jurnal belajar disimpan'); journalBase64Photo = ''; renderCurrentPage(); }
    else toast('Gagal menyimpan log jurnal', 'error');
}

async function approveUser(id, status) {
    const rec = allData.find(d => d.__backendId === id);
    if (!rec) return;
    if (status === 'rejected') {
        await window.dataSdk.delete(rec);
        toast('Pendaftaran pengguna berhasil ditolak & dihapus');
    } else {
        rec.approval_status = 'approved';
        await window.dataSdk.update(rec);
        toast('Akun guru dikonfirmasi & diaktifkan');
    }
    renderCurrentPage();
}

async function toggleBlockUser(id) {
    const rec = allData.find(d => d.__backendId === id);
    if (!rec) return;
    rec.is_blocked = !rec.is_blocked;
    await window.dataSdk.update(rec);
    toast(rec.is_blocked ? 'Akun dinonaktifkan / diblokir' : 'Blokir dibuka, akun kembali aktif');
    renderCurrentPage();
}

                <div class="flex items-center gap-4 mb-4">
                    <div id="profile-photo-container" class="relative">
                        <img id="profile-photo-display" src="${currentUser.photo || ''}" alt="Foto Profil" class="w-20 h-20 rounded-full object-cover bg-blue-100 dark:bg-blue-900 border-2 border-blue-200 ${currentUser.photo?'':'hidden'}">
                        <div id="profile-photo-placeholder" class="w-20 h-20 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-2xl font-bold text-blue-600 ${currentUser.photo?'hidden':''}">${currentUser.name.charAt(0)}</div>
                        <button onclick="document.getElementById('photo-input').click()" class="absolute -bottom-1 -right-1 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-full shadow-lg">
                            <i data-lucide="camera" class="w-3 h-3"></i>
                        </button>
                    </div>
                    <input id="photo-input" type="file" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                    <div>
                        <p class="font-medium">${currentUser.name}</p>
                        <p class="text-sm text-slate-500">${currentUser.email}</p>
                        <p class="text-xs text-slate-400 mt-1">Role: ${currentUser.role === 'wali_kelas' ? 'Wali Kelas' : currentUser.role}</p>
                        ${currentUser.photo ? `<button onclick="deleteProfilePhoto()" class="text-xs text-red-600 hover:underline mt-2">Hapus Foto</button>` : ''}
                    </div>
                </div>
            </div>
            <!-- Ubah Email/Password -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="edit" class="w-4 h-4"></i> Ubah Akun</h3>
                <div class="space-y-3">
                    <div><label class="text-sm font-medium">Email Baru</label><input id="set-email" type="email" value="${currentUser.email}" class="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm"></div>
                    <div><label class="text-sm font-medium">Password Baru</label><input id="set-pass" type="password" class="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm" placeholder="Kosongkan jika tidak diubah"></div>
                    <button onclick="updateAccount()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">Simpan Perubahan</button>
                </div>
            </div>
            <!-- Tema -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="sun" class="w-4 h-4"></i> Tema</h3>
                <div class="flex gap-3">
                    <button onclick="setTheme('light')" class="px-4 py-2 rounded-lg text-sm font-medium ${appTheme==='light'?'bg-blue-600 text-white':'bg-slate-100 dark:bg-slate-700'}">Terang</button>
                    <button onclick="setTheme('dark')" class="px-4 py-2 rounded-lg text-sm font-medium ${appTheme==='dark'?'bg-blue-600 text-white':'bg-slate-100 dark:bg-slate-700'}">Gelap</button>
                </div>
            </div>
            <!-- Logout -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> Akun</h3>
                <div class="flex flex-wrap gap-3">
                    <button onclick="logout()" class="px-4 py-2 bg-slate-200 dark:bg-slate-600 hover:bg-slate-300 rounded-lg text-sm font-medium">Logout</button>
                </div>
            </div>
        </div>
    </div>`;
}

function renderPengaturan() {
    return renderSettings();
}

async function updateAccount() {
    const email = document.getElementById('set-email').value.trim();
    const pass = document.getElementById('set-pass').value;
    if (!email) return toast('Email tidak boleh kosong', 'error');
    const rec = allData.find(d => d.__backendId === currentUser.__backendId);
    if (!rec) return;
    rec.email = email;
    if (pass && pass.length >= 6) rec.password = pass;
    const r = await window.dataSdk.update(rec);
    if (r.isOk) { currentUser = rec; toast('Akun diperbarui'); renderSidebar(); renderCurrentPage(); }
    else toast('Gagal', 'error');
}

function handlePhotoUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const photoData = e.target.result;
        const rec = allData.find(d => d.__backendId === currentUser.__backendId);
        if (rec) {
            rec.photo = photoData;
            currentUser.photo = photoData;
            const r = await window.dataSdk.update(rec);
            if (r.isOk) { toast('Foto berhasil diupload'); renderSidebar(); renderCurrentPage(); }
            else toast('Gagal upload foto', 'error');
        }
    };
    reader.readAsDataURL(file);
}

async function deleteProfilePhoto() {
    const rec = allData.find(d => d.__backendId === currentUser.__backendId);
    if (rec) {
        rec.photo = '';
        currentUser.photo = '';
        const r = await window.dataSdk.update(rec);
        if (r.isOk) { toast('Foto berhasil dihapus'); renderSidebar(); renderCurrentPage(); }
        else toast('Gagal hapus foto', 'error');
    }
}

async function setTheme(theme) {
    appTheme = theme;
    applyTheme();
    const rec = allData.find(d => d.__backendId === currentUser.__backendId);
    if (rec) { rec.theme = theme; await window.dataSdk.update(rec); }
    renderCurrentPage();
}

async function adminResetPassword() {
    const userId = document.getElementById('admin-user-select').value;
    const newPass = document.getElementById('admin-new-pass').value;
    
    if (!userId || !newPass) return toast('Pilih pengguna dan masukkan password baru', 'error');
    if (newPass.length < 6) return toast('Password minimal 6 karakter', 'error');
    
    const rec = allData.find(d => d.__backendId === userId);
    if (!rec) return;
    
    rec.password = newPass;
    const r = await window.dataSdk.update(rec);
    if (r.isOk) {
        toast('Password berhasil direset');
        document.getElementById('admin-user-select').value = '';
        document.getElementById('admin-new-pass').value = '';
    }
    else toast('Gagal mereset password', 'error');
}

function confirmDeleteAccount() {
    if (!currentUser || currentUser.role !== 'admin') {
        return toast('Hapus akun hanya bisa dilakukan oleh admin', 'error');
    }
    const admins = getUsers().filter(u => u.role === 'admin');
    if (admins.length <= 1) {
        return toast('Admin terakhir tidak bisa dihapus', 'error');
    }
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/40 flex items-center justify-center z-50';
    overlay.innerHTML = `<div class="bg-white dark:bg-slate-800 rounded-xl p-6 max-w-sm mx-4 shadow-xl">
        <p class="font-semibold mb-2 text-red-600">Hapus Akun?</p>
        <p class="text-sm text-slate-500 mb-4">Akun Anda akan dihapus permanen. Tindakan ini tidak dapat dibatalkan.</p>
        <div class="flex gap-2 justify-end">
            <button id="cancel-da" class="px-4 py-2 bg-slate-200 dark:bg-slate-600 rounded-lg text-sm">Batal</button>
            <button id="confirm-da" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">Hapus</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#cancel-da').onclick = () => overlay.remove();
    overlay.querySelector('#confirm-da').onclick = async () => {
        overlay.remove();
        const rec = allData.find(d => d.__backendId === currentUser.__backendId);
        if (rec) await window.dataSdk.delete(rec);
        logout();
        toast('Akun dihapus');
    };
}

window.addEventListener('resize', () => {
    const sb = document.getElementById('sidebar');
    if (window.innerWidth >= 1024 && sb) sb.classList.remove('hidden', 'fixed', 'z-40', 'inset-0');
});
</script></body>
</html>
